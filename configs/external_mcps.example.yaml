# Optional composition with other open-source MCP servers (documentation + ops).
#
# threat-research-mcp is the defensive workflow + ingestion + orchestration core.
# Many organizations also enable specialist MCPs in the same Cursor / Desktop host.
#
# This file is NOT loaded by code by default — it is a template for your runbooks
# and for future embedded-bridge configuration if we add MCP-client tooling.

# Enable in your MCP host (e.g. Cursor ~/.cursor/mcp.json) alongside threat-research-mcp:

recommended_bundle:
  core:
    name: threat-research-mcp
    command: python
    args: ["-m", "threat_research_mcp.server"]
    note: "Intel → hunt → detection workflows; ingestion; policy; local persistence options."

  optional_specialists:
    - key: mitre-attack-mcp
      repo: https://github.com/MHaggis/mitre-attack-mcp
      role: "Authoritative ATT&CK queries, Navigator layers, group vs coverage."

    - key: security-detections-mcp
      repo: https://github.com/MHaggis/Security-Detections-MCP
      role: "Rule corpus search, procedure/actor coverage, detection engineering depth."

    - key: threat-hunting-mcp-server
      repo: https://github.com/THORCollective/threat-hunting-mcp-server
      role: "Behavioral / TTP-first hunting frameworks and optional SIEM flows."

    - key: fastmcp-threatintel
      repo: https://github.com/4R9UN/fastmcp-threatintel
      role: "IOC enrichment (VT, OTX, …) after this server extracts IOCs from text."

composition_modes:
  host_level:
    description: >
      Recommended for GitHub consumers: register multiple MCP servers in the client.
      The model sequences tools across servers (e.g. extract_iocs here → enrich elsewhere).
    ownership: "MCP host + operator policy"

  embedded_bridge_future:
    description: >
      Optional future: this process acts as MCP client to other servers via subprocess
      or HTTP, configured per deployment. Use when a single service must wrap everything.
    ownership: "threat-research-mcp maintainers + explicit security review"
