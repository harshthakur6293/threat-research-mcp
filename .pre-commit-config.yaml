# Pre-commit hooks — catch lint/format issues before they reach CI
#
# First-time setup:
#   pip install pre-commit
#   pre-commit install
#   pre-commit run --all-files   # verify clean baseline
#
# Before pushing, run the full CI check manually:
#   make ci          (Linux/macOS)
#   python -m ruff check . && python -m ruff format --check . && python -m pytest tests/ -q

repos:
  # Ruff — linter + formatter (mirrors CI exactly, < 1s per commit)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.8
    hooks:
      - id: ruff          # ruff check --fix
        args: [--fix]
      - id: ruff-format   # ruff format

  # General hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        exclude: ^demo/
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: end-of-file-fixer
        exclude: \.(svg|cast)$
      - id: trailing-whitespace
        exclude: \.(svg|cast|md)$
      - id: debug-statements
