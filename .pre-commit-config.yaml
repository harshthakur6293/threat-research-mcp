# Pre-commit hooks — prevent CI failures before they reach GitHub
# Install: pre-commit install && pre-commit install --hook-type pre-push
# Run all manually: pre-commit run --all-files

repos:
  # Ruff — linter + formatter (mirrors CI exactly)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.8
    hooks:
      - id: ruff          # ruff check --fix  (runs on commit)
        args: [--fix]
      - id: ruff-format   # ruff format        (runs on commit)

  # General hygiene checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        exclude: ^demo/          # skip cast/svg files
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: end-of-file-fixer
        exclude: \.(svg|cast)$   # skip binary-ish generated files
      - id: trailing-whitespace
        exclude: \.(svg|cast|md)$
      - id: debug-statements

  # Pytest — runs on pre-push only (not on every commit, to stay fast)
  - repo: local
    hooks:
      - id: pytest
        name: pytest (full suite)
        language: system
        entry: python -m pytest tests/ -q --no-header --tb=short -x
        pass_filenames: false
        always_run: true
        stages: [pre-push]
