[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "threat-research-mcp"
version = "0.2.0"
description = "Defensive security MCP server with multi-agent orchestration."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
authors = [{ name = "Harsh Thakur" }]
dependencies = [
  "pydantic>=2.7.0",
  "PyYAML>=6.0.1",
  "mcp>=1.8.0; python_version >= '3.10'",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "pytest-cov>=5.0.0",
  "ruff>=0.8.0",
  "mypy>=1.10.0",
  "bandit>=1.7.9",
  "pip-audit>=2.7.3",
  "build>=1.2.1",
  "twine>=5.1.1",
]

[project.scripts]
threat-research-mcp = "threat_research_mcp.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.coverage.run]
omit = [
    "src/threat_research_mcp/__main__.py",
    "src/threat_research_mcp/cli.py",
    "src/threat_research_mcp/server.py",
    "src/threat_research_mcp/coverage/*",
    "src/threat_research_mcp/hunt/*",
    "src/threat_research_mcp/integrations/*",
    "src/threat_research_mcp/memory/*",
    "src/threat_research_mcp/observability/*",
    "src/threat_research_mcp/policy/*",
    "src/threat_research_mcp/providers/*",
    "src/threat_research_mcp/resources/*",
    "src/threat_research_mcp/retrieval/*",
    "src/threat_research_mcp/tenancy/*",
    "src/threat_research_mcp/storage/repositories/*",
    "src/threat_research_mcp/storage/migrations.py",
    "src/threat_research_mcp/storage/models.py",
    "src/threat_research_mcp/orchestrator/approvals.py",
    "src/threat_research_mcp/orchestrator/trace.py",
    "src/threat_research_mcp/tools/intel_storage_tools.py",
    "src/threat_research_mcp/tools/detection_gap_analysis.py",
    "src/threat_research_mcp/tools/map_data_sources.py",
    "src/threat_research_mcp/utils/files.py",
    "src/threat_research_mcp/utils/ids.py",
    "src/threat_research_mcp/utils/text.py",
    "src/threat_research_mcp/utils/time_utils.py",
    "src/threat_research_mcp/utils/validation.py",
    "src/threat_research_mcp/utils/yaml_utils.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.bandit]
exclude_dirs = ["tests", "examples"]
skips = ["B310", "B314", "B405", "B608"]
