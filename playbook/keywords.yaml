# ATT&CK keyword index — SINGLE SOURCE OF TRUTH
# map_attack.py loads exclusively from this file. DO NOT duplicate entries in Python code.
#
# Format: each entry requires keyword, tactic, technique_id, technique_name
# Matching is case-insensitive. Word boundaries are applied automatically for
# purely alphanumeric keywords (prevents substring false-positives).
#
# To contribute: add entries below and submit a PR.
# Keyword expansion guidelines:
#   - Prefer specific tool/command names over generic verbs
#   - Each technique should have ≥5 keywords where possible
#   - Test with a real threat report before submitting

