name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .[dev]
      - run: python -m bandit -r src
        # --skip-editable: skip threat-research-mcp (local install, not on PyPI)
        # --ignore-vuln CVE-2026-3219: pip 26.x CVE in the runner's pip, not our deps
      - run: python -m pip_audit --skip-editable --ignore-vuln CVE-2026-3219
