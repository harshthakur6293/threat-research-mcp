name: cache-hygiene

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose list or purge"
        required: true
        default: "list"
        type: choice
        options:
          - list
          - purge
  schedule:
    - cron: "0 5 * * 0"

permissions:
  actions: write
  contents: read

jobs:
  manage-caches:
    runs-on: ubuntu-latest
    steps:
      - name: List caches
        if: ${{ github.event_name == 'schedule' || inputs.mode == 'list' }}
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const res = await github.request('GET /repos/{owner}/{repo}/actions/caches', {
              owner,
              repo,
              per_page: 100
            });
            core.info(`Total caches: ${res.data.total_count}`);
            for (const c of res.data.actions_caches || []) {
              core.info(`key=${c.key} | size=${c.size_in_bytes} | last_accessed=${c.last_accessed_at}`);
            }

      - name: Purge caches
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'purge' }}
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const res = await github.request('GET /repos/{owner}/{repo}/actions/caches', {
              owner,
              repo,
              per_page: 100
            });
            const caches = res.data.actions_caches || [];
            core.info(`Purging ${caches.length} caches`);
            for (const c of caches) {
              await github.request('DELETE /repos/{owner}/{repo}/actions/caches/{cache_id}', {
                owner,
                repo,
                cache_id: c.id
              });
              core.info(`Deleted cache id=${c.id} key=${c.key}`);
            }